# HydroMind frontend container: serves the built React SPA and reverse-proxies
# API + WebSocket traffic to the backend service on the Docker network.
# Certbot (--nginx) extends this with a 443 server block in production; see
# infra/DEPLOY.md.

upstream hydromind_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static SPA assets with sensible caching.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST API endpoints — forward to FastAPI. Must list every backend router
    # (see backend/main.py include_router calls); anything missing here falls
    # through to the SPA and returns index.html instead of JSON.
    location ~ ^/(readings|forecast|alerts|chat|drains|methane|model|simulate|health) {
        proxy_pass http://hydromind_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket live feed — requires HTTP/1.1 + Upgrade headers.
    location /ws {
        proxy_pass http://hydromind_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback — client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
