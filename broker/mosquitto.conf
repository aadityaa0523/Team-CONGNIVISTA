# Plain listener — used by the backend on the internal Docker network and for
# local development. Works out of the box with no certs.
listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ── TLS listener (Phase 9, production) ────────────────────────────────────────
# Enable for ESP32 nodes connecting over the public internet. Uncomment after
# generating certs and mounting them at /mosquitto/certs (see infra/DEPLOY.md).
# Leaving these commented keeps `docker compose up` working from a clean state.
#
# listener 8883
# cafile   /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile  /mosquitto/certs/server.key
# tls_version tlsv1.2
# require_certificate false
